services:
  - type: web
    name: atmos-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: WAQI_API_KEY
        value: cf4a1a6815fac27dd20757d4052d8b516b847950
